site_name: p1uscode
site_url: https://p1uscode.com/
site_description: p1uscode の lab とドキュメント
repo_url: https://github.com/p1uscode/p1uscode.github.io
repo_name: p1uscode/p1uscode.github.io
edit_uri: edit/main/

docs_dir: docs

watch:
  - ai/docs
  - ai/mkdocs.yml

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: ダークモードに切替
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: ライトモードに切替
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      lang:
        - ja
        - en
  - monorepo

extra:
  analytics:
    provider: google
    property: G-P9Q5MX4F86

nav:
  - Home: index.md
  - AI: '!include ./ai/mkdocs.yml'
