model_list:
  # Ollama (host-side, reached via host.docker.internal)
  # wildcard で pull 済みの任意モデルを `ollama/<tag>` として呼び出せる
  # 例: `ollama/qwen3.5:9b`, `ollama/llama3.3:70b`
  - model_name: "ollama/qwen3.5:35b"
    litellm_params:
      model: "ollama_chat/qwen3.5:35b"
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: "ollama/qwen3.5:9b"
    litellm_params:
      model: "ollama_chat/qwen3.5:9b"
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: "ollama/qwen3.5:0.8b"
    litellm_params:
      model: "ollama_chat/qwen3.5:0.8b"
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: "ollama/gemma4:31b"
    litellm_params:
      model: "ollama_chat/gemma4:31b"
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: "ollama/gemma4:e4b"
    litellm_params:
      model: "ollama_chat/gemma4:e4b"
      api_base: os.environ/OLLAMA_BASE_URL

  - model_name: "ollama/*"
    litellm_params:
      model: "ollama_chat/*"
      api_base: os.environ/OLLAMA_BASE_URL

  # OpenAI
  - model_name: gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.4-mini
    litellm_params:
      model: openai/gpt-5.4-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-5.4-nano
    litellm_params:
      model: openai/gpt-5.4-nano
      api_key: os.environ/OPENAI_API_KEY

  # Anthropic
  - model_name: claude-opus-4-6
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # Google Gemini
  - model_name: gemini-3.1-pro-preview
    litellm_params:
      model: gemini/gemini-3.1-pro-preview
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-3-flash-preview
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY

litellm_settings:
  drop_params: true
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  num_retries: 2
  request_timeout: 600
  # Open WebUI / Dify 等のクライアントからの metadata を Langfuse trace に転送
  langfuse_default_tags:
    - "caller_name"
    - "user_api_key_alias"
    - "user_api_key_user_id"
    - "user_api_key_team_alias"
    - "semantic-similarity"
    - "proxy_base_url"

router_settings:
  # 429 (rate limit) や一時エラー時のフォールバック連鎖 (同一プロバイダ内で完結させる)
  fallbacks:
    - claude-opus-4-6: ["claude-sonnet-4-6", "claude-haiku-4-5"]
    - claude-sonnet-4-6: ["claude-haiku-4-5"]
    - gpt-5.4: ["gpt-5.4-mini", "gpt-5.4-nano"]
    - gpt-5.4-mini: ["gpt-5.4-nano"]
    - gemini-3.1-pro-preview: ["gemini-3-flash-preview", "gemini-2.5-pro"]
    - gemini-3-flash-preview: ["gemini-2.5-flash"]
    - gemini-2.5-pro: ["gemini-2.5-flash"]
